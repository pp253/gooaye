name: Update podcast data

on:
  schedule:
    # 每日 01:00 UTC = 台灣 09:00。extract 只在有新集時才呼叫 OpenAI（才有成本）
    - cron: '0 1 * * *'
  workflow_dispatch:

# 同時間只跑一個，避免兩次寫入打架
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EXTRACT_MODEL: ${{ secrets.OPENAI_EXTRACT_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync env
        run: uv sync

      - name: Run incremental update
        run: uv run python scripts/update_all.py
